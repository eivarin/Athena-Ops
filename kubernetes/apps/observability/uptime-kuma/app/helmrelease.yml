---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-3.0.1/charts/library/common/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name uptime-kuma
spec:
  dependsOn:
    - name: longhorn
      namespace: storage
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  releaseName: *name
  maxHistory: 1
  values:
    controllers:
      app:
        enabled: true
        type: deployment
        replicas: 1

        containers:
          app:
            image:
              repository: louislam/uptime-kuma
              tag: 2.3.0
              pullPolicy: IfNotPresent

            env:
              # TZ: ${TIMEZONE}
              UPTIME_KUMA_PORT: &port 3001
              UPTIME_KUMA_DISABLE_FRAME_SAMEORIGIN: true

            resources:
              requests:
                cpu: 15m
              limits:
                memory: 256Mi

    service:
      uptime-kuma:
        controller: app
        ports:
          http:
            port: 3001

    route:
      main:
        enabled: true
        kind: HTTPRoute
        parentRefs:
          - name: traefik-private-default
            namespace: network
            sectionName: https-wildcard-secret-private-domain
        hostnames:
          - "kuma.${SECRET_PRIVATE_DOMAIN}"
        rules:
          - backendRefs:
            - name: uptime-kuma
              port: 3001
      public:
        enabled: true
        kind: HTTPRoute
        parentRefs:
          - name: traefik-public-default
            namespace: network
            sectionName: https-status-wildcard
        hostnames:
          - "*.status.${SECRET_PUBLIC_DOMAIN1}"
        rules:
          - backendRefs:
            - name: uptime-kuma
              port: 3001

    persistence:
      uptime-kuma-data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: uptime-kuma-data
        globalMounts:
          - path: /app/data
            readOnly: false
