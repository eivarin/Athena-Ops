apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name uptime-kuma
  namespace: flux-system
spec:
  targetNamespace: observability
  interval: 10m0s
  retryInterval: 1m
  path: ./kubernetes/apps/observability/uptime-kuma/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  postBuild:
    substitute:
      app: *name
      host_priv: "kuma.${SECRET_PRIVATE_DOMAIN}"
      host_pub: "*.status.${SECRET_PUBLIC_DOMAIN1}"
